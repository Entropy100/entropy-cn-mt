<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entropy 主页</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            background:#f0f4f8;
            font-family:微软雅黑,sans-serif;
        }
        。box{
            background:#fff;
            padding:40px 60px;
            border-radius:12px;
            box-shadow:0 4px 20px #00000015;
            text-align:center;
        }
        h1{
            color:#222;
            margin-bottom:15px;
        }
        p{
            color:#666;
            font-size:16px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>欢迎来到 entropy.cn.mt</h1>
        <p>你的静态网页部署成功 ✅</p>
    </div>
</body>
</html>
